<div class="portfolio-container">
  <div class="view-header">
    <h2 class="view-title">Engineering Directory</h2>
    <p class="view-desc">Meet the engineers behind StackOne. View their specialties and get in touch.</p>
  </div>

  <div id="portfolio-grid" class="portfolio-grid"></div>

  <div class="contact-section card">
    <h3 class="contact-title">Send a Message</h3>
    <p class="contact-desc">Have a question or feedback? Submit the form below to connect with the team.</p>

    <div id="form-message-container"></div>

    <form id="contact-form" novalidate>
      <div class="form-group">
        <label for="contact-name" class="form-label">Name</label>
        <input type="text" id="contact-name" class="form-input" placeholder="Your name">
        <span id="error-name" class="form-error">Name is required.</span>
      </div>
      <div class="form-group">
        <label for="contact-email" class="form-label">Email Address</label>
        <input type="email" id="contact-email" class="form-input" placeholder="you@example.com">
        <span id="error-email" class="form-error">Please provide a valid email address.</span>
      </div>
      <div class="form-group">
        <label for="contact-body" class="form-label">Message</label>
        <textarea id="contact-body" class="form-textarea" placeholder="Your message details..."></textarea>
        <span id="error-body" class="form-error">Message must be at least 10 characters long.</span>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
  </div>
</div>
