<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="kanban-container">
    <div class="view-header">
      <h2 class="view-title">Kanban Workflow</h2>
      <p class="view-desc">Organize project sprints and manage assignments. Drag cards to update progress.</p>
    </div>

    <div class="kanban-board">
      <div class="kanban-column" data-column="todo" id="col-todo">
        <div class="kanban-column-header">
          <span class="kanban-column-title">
            <span style="color: crimson;">●</span> To Do
          </span>
          <span class="kanban-column-count" id="count-todo">0</span>
        </div>
        <div class="cards-list" id="cards-todo"></div>
        <button class="add-btn" data-column="todo">+ Add Card</button>
      </div>

      <div class="kanban-column" data-column="inProgress" id="col-inProgress">
        <div class="kanban-column-header">
          <span class="kanban-column-title">
            <span style="color: orange;">●</span> In Progress
          </span>
          <span class="kanban-column-count" id="count-inProgress">0</span>
        </div>
        <div class="cards-list" id="cards-inProgress"></div>
        <button class="add-btn" data-column="inProgress">+ Add Card</button>
      </div>

      <div class="kanban-column" data-column="done" id="col-done">
        <div class="kanban-column-header">
          <span class="kanban-column-title">
            <span style="color: green;">●</span> Done
          </span>
          <span class="kanban-column-count" id="count-done">0</span>
        </div>
        <div class="cards-list" id="cards-done"></div>
        <button class="add-btn" data-column="done">+ Add Card</button>
      </div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h3 id="modalTitle" class="modal-title">Add Card</h3>
      
      <div class="form-group">
        <label for="cardTitleInput" class="form-label">Title</label>
        <input type="text" id="cardTitleInput" class="form-input" placeholder="Enter task title...">
      </div>
      
      <div class="form-group">
        <label for="cardDescInput" class="form-label">Description</label>
        <textarea id="cardDescInput" class="form-textarea" placeholder="Enter task description..." rows="3"></textarea>
      </div>
      
      <div class="form-group">
        <label for="cardPriorityInput" class="form-label">Priority</label>
        <select id="cardPriorityInput" class="form-select">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      
      <div id="errorText" class="error-text"></div>
      
      <div class="modal-actions">
        <button id="cancelCardBtn" class="btn btn-secondary">Cancel</button>
        <button id="saveCardBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
