<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>GitHub Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="dark">

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>

  <div class="page-wrapper">
    <!-- GitHub Section -->
    <div class="github-container" id="github-section">
      <div class="view-header">
        <h1 class="view-title">GitHub Explorer</h1>
        <p class="view-desc">Query public developer metadata, review repositories, and analyze language usage statistics.</p>
      </div>

      <div class="github-search-card card">
        <input type="text" id="git-search-input" class="form-input" placeholder="Type a GitHub username (e.g. octocat, google)...">
        <button id="git-search-btn" class="btn btn-primary">Search Profile</button>
      </div>

      <div id="git-status-banner"></div>
      <div id="git-workspace-area"></div>
    </div>
