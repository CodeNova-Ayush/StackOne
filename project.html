<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GitHub Explorer - Query public developer metadata, review repositories, and analyze language usage statistics.">
  <title>GitHub Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Base / Reset ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.dark {
      background-color: rgb(18, 18, 22);
      color: rgb(220, 220, 225);
    }

    body.light {
      background-color: rgb(245, 245, 248);
      color: rgb(30, 30, 35);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== Layout Container ===== */
    .page-wrapper {
      max-width: 1100px;
      width: 100%;
    }

    /* ===== View Header ===== */
    .view-header {
      margin-bottom: 8px;
    }

    .view-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .view-desc {
      font-size: 0.9rem;
      color: gray;
      line-height: 1.5;
    }

    body.light .view-desc {
      color: dimgray;
    }
    /* ===== Theme Toggle ===== */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      background: none;
      border: 1px solid rgba(128,128,128,0.4);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    body.dark .theme-toggle {
      color: rgb(220, 220, 225);
      border-color: rgb(60, 60, 65);
    }

    body.light .theme-toggle {
      color: rgb(30, 30, 35);
      border-color: lightgray;
    }

    /* ===== Common UI Components ===== */
    .card {
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid rgba(128,128,128,0.3);
      transition: background-color 0.3s, border-color 0.3s;
    }

    body.dark .card {
      background-color: rgb(30, 30, 35);
      border-color: rgb(60, 60, 65);
    }

    body.light .card {
      background-color: white;
      border-color: rgb(220, 220, 225);
    }

    .form-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(128,128,128,0.3);
      outline: none;
      transition: border-color 0.2s, background-color 0.3s, color 0.3s;
    }

    body.dark .form-input {
      background-color: rgb(40, 40, 45);
      border-color: rgb(60, 60, 65);
      color: rgb(220, 220, 225);
    }

    body.light .form-input {
      background-color: rgb(250, 250, 252);
      border-color: rgb(210, 210, 215);
      color: rgb(30, 30, 35);
    }

    .form-input:focus {
      border-color: rgb(198, 90, 61);
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgb(198, 90, 61), rgb(220, 120, 80));
      color: white;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgb(180, 75, 50), rgb(200, 100, 65));
    }

    .filter-tab {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(128,128,128,0.3);
      cursor: pointer;
      transition: all 0.2s;
    }

    body.dark .filter-tab {
      background-color: rgb(40, 40, 45);
      border-color: rgb(60, 60, 65);
      color: rgb(180, 180, 185);
    }

    body.light .filter-tab {
      background-color: rgb(240, 240, 243);
      border-color: rgb(210, 210, 215);
      color: rgb(80, 80, 85);
    }

    .filter-tab.active {
      background-color: rgb(198, 90, 61);
      border-color: rgb(198, 90, 61);
      color: white;
    }

    .filter-tab:hover:not(.active) {
      border-color: rgb(198, 90, 61);
      color: rgb(198, 90, 61);
    }

    /* ===== Spinner ===== */
    .spinner-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
      color: gray;
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(128,128,128,0.2);
      border-top-color: rgb(198, 90, 61);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Status Banner ===== */
    .news-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px 0;
      color: gray;
    }

    .empty-state-icon {
      font-size: 2.5rem;
    }
    /* ===== GitHub Section Layout ===== */
    .github-container {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .github-search-card {
      display: flex;
      gap: 16px;
    }

    .github-search-card .form-input {
      flex: 1;
    }

    .github-workspace {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    .github-profile-col {
      width: 300px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ===== Profile Card ===== */
    .github-profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
      padding: 28px;
      border: 1px solid gray;
      border-radius: 12px;
    }

    body.dark .github-profile-card {
      background-color: rgb(30, 30, 35);
      border-color: rgb(60, 60, 65);
    }

    body.light .github-profile-card {
      background-color: white;
      border-color: lightgray;
    }

    .github-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid gray;
      transition: transform 0.3s ease;
    }

    .github-avatar:hover {
      transform: scale(1.05);
    }

    body.dark .github-avatar {
      border-color: rgb(80, 80, 80);
    }

    body.light .github-avatar {
      border-color: lightgray;
    }

    .github-profile-name {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .github-profile-login {
      font-size: 0.9rem;
      color: rgb(198, 90, 61);
      margin-top: -10px;
      font-weight: bold;
    }

    .github-profile-bio {
      font-size: 0.85rem;
      color: gray;
      line-height: 1.5;
      margin: 10px 0;
    }

    body.light .github-profile-bio {
      color: dimgray;
    }

    .github-stats-row {
      display: flex;
      justify-content: space-around;
      width: 100%;
      border-top: 1px solid gray;
      border-bottom: 1px solid gray;
      padding: 14px 0;
      margin: 10px 0;
    }

    body.dark .github-stats-row {
      border-color: rgb(60, 60, 65);
    }

    body.light .github-stats-row {
      border-color: lightgray;
    }

    .github-stat-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .github-stat-val {
      font-weight: bold;
      font-size: 1.1rem;
    }

    .github-stat-lbl {
      font-size: 0.75rem;
      color: gray;
    }

    body.light .github-stat-lbl {
      color: dimgray;
    }

    .github-details-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      text-align: left;
      font-size: 0.85rem;
      color: gray;
    }

    body.light .github-details-list {
      color: dimgray;
    }

    .github-detail-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body class="dark">

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>

  <div class="page-wrapper">
    <!-- GitHub Section -->
    <div class="github-container" id="github-section">
      <div class="view-header">
        <h1 class="view-title">GitHub Explorer</h1>
        <p class="view-desc">Query public developer metadata, review repositories, and analyze language usage statistics.</p>
      </div>

      <div class="github-search-card card">
        <input type="text" id="git-search-input" class="form-input" placeholder="Type a GitHub username (e.g. octocat, google)...">
        <button id="git-search-btn" class="btn btn-primary">Search Profile</button>
      </div>

      <div id="git-status-banner"></div>
      <div id="git-workspace-area"></div>
    </div>
  </div>

  <script>
  </script>
</body>
</html>
