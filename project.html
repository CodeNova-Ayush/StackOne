<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Quiz Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reset & Base Styles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 20px;
            background-color: rgb(18, 18, 22);
            color: #e0e0e0;
        }

        .quiz-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .view-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .view-title {
            font-size: 2rem;
            font-weight: 700;
            color: rgb(198, 90, 61);
            margin-bottom: 8px;
        }

        .view-desc {
            font-size: 1rem;
            color: #999;
        }

        /* Quiz Header & Progress Bar */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .quiz-progress-bar-container {
            width: 100%;
            height: 10px;
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid rgb(60, 60, 65);
            background-color: rgb(30, 30, 35);
        }

        .quiz-progress-bar {
            height: 100%;
            width: 0%;
            background-color: rgb(198, 90, 61);
            transition: width 0.4s ease;
        }

        /* Timer Styles */
        .quiz-timer {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: orange;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgb(60, 60, 65);
            background-color: rgb(30, 30, 35);
            white-space: nowrap;
        }

        .quiz-timer.danger {
            color: crimson;
            border-color: crimson;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* Question Card */
        .quiz-question-card {
            border: 1px solid rgb(60, 60, 65);
            border-radius: 16px;
            padding: 36px;
            background-color: rgb(30, 30, 35);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 28px;
            line-height: 1.5;
            color: #fff;
        }

        /* Options */
        .quiz-options-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .quiz-option {
            width: 100%;
            text-align: left;
            padding: 18px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid rgb(80, 80, 80);
            border-radius: 10px;
            cursor: pointer;
            background-color: rgb(40, 40, 45);
            color: white;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background-color 0.2s, transform 0.1s;
        }

        .quiz-option:hover:not(:disabled) {
            border-color: rgb(198, 90, 61);
            background-color: rgb(45, 45, 50);
            transform: translateY(-1px);
        }

        .quiz-option:disabled {
            cursor: not-allowed;
        }

        .quiz-option.correct {
            background-color: #2e7d32 !important;
            border-color: #2e7d32 !important;
            color: white !important;
        }

        .quiz-option.incorrect {
            background-color: crimson !important;
            border-color: crimson !important;
            color: white !important;
        }

        .quiz-option-status-icon {
            font-size: 1.2rem;
            float: right;
        }

        .quiz-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }

        /* Buttons */
        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary {
            background-color: rgb(198, 90, 61);
            color: white;
        }

        .btn-primary:hover {
            background-color: rgb(218, 100, 68);
            transform: translateY(-1px);
        }

        /* Summary Card */
        .quiz-summary-card {
            border: 1px solid rgb(60, 60, 65);
            border-radius: 16px;
            padding: 54px 36px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            background-color: rgb(30, 30, 35);
        }

        .quiz-summary-card h2 {
            color: #fff;
        }

        .quiz-summary-card h3 {
            color: #ccc;
        }

        .quiz-summary-score-badge {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            color: rgb(198, 90, 61);
            font-size: 2.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgb(198, 90, 61);
        }

        .quiz-summary-text {
            font-size: 1.15rem;
            max-width: 450px;
            line-height: 1.7;
            color: #aaa;
        }

        /* Explanation Box */
        .explanation-box {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgb(60, 60, 65);
        }

        .explanation-status {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .explanation-status.correct {
            color: #4caf50;
        }

        .explanation-status.incorrect {
            color: crimson;
        }

        .explanation-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Quiz Container -->
    <div class="quiz-container" id="quiz-container">
        <div class="view-header">
            <h2 class="view-title">JS Quiz Engine</h2>
            <p class="view-desc">Test your JavaScript depth with a custom-timed multiple-choice quiz engine.</p>
        </div>

        <div id="quiz-workspace"></div>
    </div>

    <!-- JavaScript -->
    <script>
        // Quiz Questions Data
        var questions = [
            {
                question: "What is typeof null?",
                options: ["'null'", "'object'", "'undefined'", "'string'"],
                answer: 1,
                explanation: "In JavaScript, 'typeof null' returns 'object'. This is a historical bug in the language."
            },
            {
                question: "Which is NOT primitive?",
                options: ["Boolean", "String", "Symbol", "Float"],
                answer: 3,
                explanation: "JavaScript has primitives like Boolean, String, Symbol, Number, and BigInt. 'Float' is not a separate primitive."
            },
            {
                question: "What is 0.1 + 0.2 === 0.3?",
                options: ["true", "false", "NaN", "TypeError"],
                answer: 1,
                explanation: "Due to binary precision issues, 0.1 + 0.2 equals 0.30000000000000004, which is not strictly equal to 0.3."
            },
            {
                question: "Which declares block scope?",
                options: ["var", "let", "global", "unlet"],
                answer: 1,
                explanation: "Variables declared with 'let' and 'const' are block-scoped and hoisted, but remain in the Temporal Dead Zone."
            },
            {
                question: "What is [] + []?",
                options: ["[]", "undefined", "NaN", "'' (empty string)"],
                answer: 3,
                explanation: "When adding two arrays, JavaScript converts both to empty strings, resulting in an empty string concatenation."
            },
            {
                question: "Which method removes the last element?",
                options: ["shift()", "pop()", "slice()", "splice()"],
                answer: 1,
                explanation: "'pop()' removes and returns the last element. 'shift()' removes and returns the first element."
            },
            {
                question: "Which creates a shallow copy?",
                options: ["Object.assign()", "Spread operator", "Both of these", "None of these"],
                answer: 2,
                explanation: "Both the spread operator '{ ...user }' and 'Object.assign({}, user)' create a shallow copy of the object."
            },
            {
                question: "What is the difference between == and ===?",
                options: ["Reference vs Value", "Coercion vs Strict", "Speed", "Object only"],
                answer: 1,
                explanation: "== compares for equality after type coercion. === compares both value and type without coercion."
            },
            {
                question: "What does Promise.all() do?",
                options: ["All-or-nothing", "Resolves any", "Runs sequentially", "Fails only if all fail"],
                answer: 0,
                explanation: "Promise.all() resolves when all promises resolve, or rejects immediately if any promise rejects."
            },
            {
                question: "How to check property existence?",
                options: ["'prop' in obj", "hasOwnProperty()", "Both of these", "None of these"],
                answer: 2,
                explanation: "Both the 'in' operator and the 'hasOwnProperty()' method check for properties inside an object."
            }
        ];

        // Quiz State Variables
        var index = 0;
        var score = 0;
        var answered = false;
        var selected = null;
        var answerLog = [];
        var timer = null;
        var container = document.getElementById("quiz-container");

        // Initialize quiz on page load
        window.addEventListener("DOMContentLoaded", function () {
            renderQuiz();
        });

        // Reset all state to start fresh
        function resetState() {
            index = 0;
            score = 0;
            answered = false;
            selected = null;
            answerLog = [];
        }

        // Stop the countdown timer
        function stopTimer() {
            if (timer !== null) {
                clearTimeout(timer);
                timer = null;
            }
        }

        // Start countdown timer (15 seconds)
        function startTimer() {
            var duration = 15;
            var timeLeft = duration;
            stopTimer();

            var timerEl = document.getElementById("quiz-timer");
            var progressEl = document.getElementById("quiz-progress-bar");
            if (timerEl) {
                timerEl.textContent = "⏱️ " + timeLeft + "s";
                timerEl.classList.remove("danger");
            }
            if (progressEl) {
                progressEl.style.width = "0%";
            }

            function tick() {
                if (timeLeft <= 0) {
                    autoSubmitAnswer();
                    return;
                }
                timeLeft--;
                if (timerEl) {
                    timerEl.textContent = "⏱️ " + timeLeft + "s";
                    if (timeLeft <= 5) {
                        timerEl.classList.add("danger");
                    }
                }
                if (progressEl) {
                    var percent = ((duration - timeLeft) / duration) * 100;
                    progressEl.style.width = percent + "%";
                }
                timer = setTimeout(tick, 1000);
            }
            timer = setTimeout(tick, 1000);
        }

        // Auto submit question on timer expiry
        function autoSubmitAnswer() {
            selectOption(-1);
        }

        // Decide whether to show question or results
        function renderQuiz() {
            if (index >= questions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }
    </script>

</body>
</html>
