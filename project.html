<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GitHub Explorer - Query public developer metadata, review repositories, and analyze language usage statistics.">
  <title>GitHub Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Base / Reset ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.dark {
      background-color: rgb(18, 18, 22);
      color: rgb(220, 220, 225);
    }

    body.light {
      background-color: rgb(245, 245, 248);
      color: rgb(30, 30, 35);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== Layout Container ===== */
    .page-wrapper {
      max-width: 1100px;
      width: 100%;
    }

    /* ===== View Header ===== */
    .view-header {
      margin-bottom: 8px;
    }

    .view-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .view-desc {
      font-size: 0.9rem;
      color: gray;
      line-height: 1.5;
    }

    body.light .view-desc {
      color: dimgray;
    }
  </style>
</head>
<body class="dark">

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>

  <div class="page-wrapper">
    <!-- GitHub Section -->
    <div class="github-container" id="github-section">
      <div class="view-header">
        <h1 class="view-title">GitHub Explorer</h1>
        <p class="view-desc">Query public developer metadata, review repositories, and analyze language usage statistics.</p>
      </div>

      <div class="github-search-card card">
        <input type="text" id="git-search-input" class="form-input" placeholder="Type a GitHub username (e.g. octocat, google)...">
        <button id="git-search-btn" class="btn btn-primary">Search Profile</button>
      </div>

      <div id="git-status-banner"></div>
      <div id="git-workspace-area"></div>
    </div>
  </div>

  <script>
  </script>
</body>
</html>
